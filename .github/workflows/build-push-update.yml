name: Build, Push & Update

on:
    workflow_call:
        inputs:
            service_name:
                description: "Name of the microservice"
                required: true
                type: string
permissions:
    contents: write

concurrency:
    group: ci-${{inputs.service_name}}
    cancel-in-progress: true

jobs:
    create-image-tag:
        name: Create Image Tag
        runs-on: ubuntu-latest

        outputs:
            image_tag: ${{steps.tag.outputs.image_tag}}

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Verify Files Existence
              run: |
                test -d "./${{inputs.service_name}}"
                test -f "./${{inputs.service_name}}/Dockerfile"
                test -f "k8s-specifications/${{inputs.service_name}}/vote-deployment.yaml"

            - name: Generate Image Tag
              id: tag
              run: |
                  SHORT_SHA=${git rev-parse --short HEAD}
                  echo "image_tag=${SHORT_SHA} >> $GITHUB_OUTPUT"

    build-and-push-image:
        name: Build & Push Image
        needs: create-image-tag
        runs-on: ubuntu-latest
        env:
            IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/voting-app_${{ inputs.service_name }}
            BUILD_CONTEXT: "./${{ inputs.service_name }}"
            DOCKER_FILE: "./${{ inputs.service_name }}/Dockerfile"
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Login To Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{secrets.DOCKER_USERNAME}}
                  password: ${{secrets.DOCKER_PASSWORD}}

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build & Push Docker Image
              uses: docker/build-push-action@v6
              with:
                  context: ${{env.BUILD_CONTEXT}} 
                  file: ${{env.DOCKER_FILE}}
                  push: true

                  tag: |
                      ${{env.IMAGE_NAME}}:${{needs.create-image-tag.outputs.image_tag}}

    update-manifest:
        name: Update Manifest
        needs:
            - build-and-push-image
            - create-image-tag
        runs-on: ubuntu-latest
        concurrency:
            group: manifest-push
            cancel-in-progress: false
        env:
           
            UPDATED_IMAGE_TAG: ${{ secrets.DOCKER_USERNAME }}/voting-app_${{ inputs.service_name }}:${{ needs.create-image-tag.outputs.image_tag }}
            MANIFEST_PATH: "k8s-specifications/${{ inputs.service_name }}-deployment.yaml"

        steps:
            - name: Install yq
              run: |
                  sudo wget -qO /usr/local/bin/yq \
                   https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64

                   sudo chmod +x /usr/local/bin/yq

            - name: Update Manifest
              run: |
                  yq -i '
                     (.spec.template.spec.containers[]
                     | select(.name=="${{ inputs.service_name }}")
                     | .image)
                     = "${{ env.UPDATED_IMAGE_TAG }}"
                     ' "${{env.MANIFEST_PATH}}"

            - name: Verify Changes
              run: |
                git diff

            - name: Config Git
              run: |
                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            - name: Commit Changes
              run: |
                git add "${{ env.MANIFEST_PATH }}"

                if git diff --cached --quiet; then
                    echo "No changes."
                    exit 0
                fi


                git commit -m "chore(k8s): update ${{inputs.service_name}} image to ${{needs.create-image-tag.outputs.image_tag}}"

                # Retry loop to handle concurrent pushes from other services
                for i in 1 2 3 4 5; do
                    echo "Push attempt $i..."
                    git pull --rebase origin ${{ github.ref_name }} && \
                    git push origin HEAD:${{ github.ref_name }} && exit 0
                    echo "Push failed, retrying in $((i * 5))s..."
                    sleep $((i * 5))
                done

                echo "All push attempts failed."
                exit 1