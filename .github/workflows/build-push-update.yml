# -----------------------------------------------------------------------------
# Reusable CI workflow
#
# Responsibilities:
#   1. Build and push a Docker image.
#   2. Update the Kubernetes deployment manifest with the new image tag.
#   3. Commit the manifest change for Argo CD to deploy.
#
# This workflow is invoked by service-specific workflows (vote.yml, result.yml,
# worker.yml, etc.) using `workflow_call`.
# -----------------------------------------------------------------------------

name: Build, Push & Update

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of microservice"
        required: true
        type: string

# Permission to write into same repo
permissions:
  contents: write

# Prevent multiple builds of the same service from running simultaneously.
concurrency:
  group: ci-${{ inputs.service_name }}
  cancel-in-progress: true

jobs:
  create-image-tag:
    name: Create Image Tag
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      # Clone the entire Repo
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

        # Validate the expected repository structure before continuing.
      - name: Verify Files Existence
        run: |
          test -d "./${{ inputs.service_name }}"
          test -f "./${{ inputs.service_name }}/Dockerfile"
          test -f "k8s-specifications/${{ inputs.service_name }}-deployment.yaml"

        # Generate a short commit SHA to use as the Docker image tag.
      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image_tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"

  build-and-push-image:
    name: Build & Push Image
    needs: create-image-tag
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/voting-app_${{ inputs.service_name }}
      BUILD_CONTEXT: "./${{ inputs.service_name }}"
      DOCKER_FILE: "./${{ inputs.service_name }}/Dockerfile"
    steps:
      # Clone the Repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Authenticate with Docker Hub
      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Setup Docker Buildx tool to build images
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the Docker image and push it using the generated tag.
      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{env.BUILD_CONTEXT}}
          file: ${{env.DOCKER_FILE}}
          push: true

          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.create-image-tag.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest

  update-manifest:
    name: Update Manifest
    needs:
      - create-image-tag
      - build-and-push-image
    runs-on: ubuntu-latest
    concurrency:
      group: manifest-push # shared across ALL services
      cancel-in-progress: false # queue, don't cancel
    env:
      UPDATED_IMAGE_TAG: ${{ secrets.DOCKER_USERNAME }}/voting-app_${{ inputs.service_name }}:${{ needs.create-image-tag.outputs.image_tag }}
      MANIFEST_PATH: "k8s-specifications/${{ inputs.service_name }}-deployment.yaml"
    steps:
      # Clone the entire Repo
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install yq for safe YAML modifications.
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
          https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64

          sudo chmod +x /usr/local/bin/yq

      # Update the deployment manifest with the new Docker image.
      - name: Update Manifest
        run: |
          yq -i '
            (.spec.template.spec.containers[]
            | select(.name=="${{ inputs.service_name }}")
            | .image)
            = "${{ env.UPDATED_IMAGE_TAG }}"
          ' "${{env.MANIFEST_PATH}}"

      # Verify whether tag modification has been made.
      - name: Verify Changes
        run: |
          git diff

      # Use the GitHub Actions bot identity for automated commits.
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # # Commit and push the updated manifest.
      - name: Commit Changes
        run: |
          git add "${{ env.MANIFEST_PATH }}"

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi


          git commit -m "chore(k8s): update ${{inputs.service_name}} image to ${{needs.create-image-tag.outputs.image_tag}}"

          # Retry loop to handle concurrent pushes from other services
          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            git pull --rebase origin ${{ github.ref_name }} && \
            git push origin HEAD:${{ github.ref_name }} && exit 0
            echo "Push failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done

          echo "All push attempts failed."
          exit 1
