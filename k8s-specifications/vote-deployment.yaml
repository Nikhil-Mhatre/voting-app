apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
        - image: nikhilmhatre0317/voting-app_vote:2462094
          name: vote
          ports:
            - containerPort: 80
              name: vote
